<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>spin chirality</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f8f9fa; font-family: system-ui, -apple-system, sans-serif; }
  #root { width: 100%; max-width: 900px; padding: 20px; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useRef, useEffect, useState, useCallback, useMemo } = React;


const TAU = Math.PI * 2;

const C = {
  bg: "#050709",
  panelBg: "rgba(6,8,14,0.97)",
  grid: "rgba(20,35,65,0.3)",
  right: "#ff5555",       // right-handed / spin-up
  rightGlow: "rgba(255,60,60,0.18)",
  left: "#44aaff",        // left-handed / spin-down
  leftGlow: "rgba(40,160,255,0.18)",
  neutral: "rgba(180,200,230,0.6)",
  axis: "rgba(100,140,200,0.5)",
  field: "rgba(255,200,40,0.5)",
  text: "rgba(170,200,235,0.75)",
  textDim: "rgba(75,115,165,0.45)",
};

function rotateY(x, y, z, a) {
  return [x * Math.cos(a) + z * Math.sin(a), y, -x * Math.sin(a) + z * Math.cos(a)];
}
function rotateX(x, y, z, a) {
  return [x, y * Math.cos(a) - z * Math.sin(a), y * Math.sin(a) + z * Math.cos(a)];
}
function project3d(x, y, z, fov = 420, camZ = 5) {
  const s = fov / (fov + z + camZ);
  return { px: x * s, py: y * s, s, z };
}

function SpinChirality() {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const stateRef = useRef({
    time: 0,
    rotY: 0.5,
    rotX: 0.3,
    spinRotation: 0,    // cumulative rotation for the 720 demo
    sgAnim: 0,          // stern-gerlach animation 0..1
  });

  const [view, setView] = useState("chirality");   // chirality | rotation720 | sterngerlach
  const [handedness, setHandedness] = useState("right"); // right | left | both
  const [autoRotate, setAutoRotate] = useState(true);
  const [showAxis, setShowAxis] = useState(true);
  const [sgRunning, setSgRunning] = useState(false);
  const [rotDeg, setRotDeg] = useState(0);

  const dragging = useRef(false);
  const lastMouse = useRef({ x: 0, y: 0 });

  const startSG = () => {
    stateRef.current.sgAnim = 0;
    setSgRunning(true);
  };

  // Draw a single helix
  function drawHelix(ctx, cx, cy, rotX, rotY, isRight, alpha_mult, scale, tMin, tMax, time, animate) {
    const steps = 180;
    const radius = 0.55;
    const pitch = 0.38;   // advance per turn
    const chirality = isRight ? 1 : -1;

    let prevProj = null;

    for (let i = 0; i <= steps; i++) {
      const t = tMin + (i / steps) * (tMax - tMin);
      const angle = chirality * TAU * t + (animate ? time * 1.5 : 0);
      const hx = radius * Math.cos(angle);
      const hy = radius * Math.sin(angle);
      const hz = (t - (tMin + tMax) / 2) * pitch * (tMax - tMin);

      let [rx, ry, rz] = rotateY(hx, hy, hz, rotY);
      [rx, ry, rz] = rotateX(rx, ry, rz, rotX);
      const p = project3d(rx * scale, ry * scale, rz * scale);

      const depth = (rz + 2) / 4;
      const alpha = (0.25 + 0.75 * depth) * alpha_mult;
      const color = isRight ? C.right : C.left;

      if (prevProj) {
        ctx.beginPath();
        ctx.moveTo(cx + prevProj.px, cy + prevProj.py);
        ctx.lineTo(cx + p.px, cy + p.py);

        // Glow pass
        ctx.strokeStyle = isRight
          ? `rgba(255,60,60,${alpha * 0.15})`
          : `rgba(40,160,255,${alpha * 0.15})`;
        ctx.lineWidth = 6;
        ctx.stroke();

        ctx.strokeStyle = color;
        ctx.globalAlpha = alpha;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      prevProj = { px: cx + p.px, py: cy + p.py };
    }

    // Particle dot at leading edge
    const tLead = tMax;
    const angleLead = chirality * TAU * tLead + (animate ? time * 1.5 : 0);
    const lx = radius * Math.cos(angleLead);
    const ly = radius * Math.sin(angleLead);
    const lz = 0;
    let [rlx, rly, rlz] = rotateY(lx, ly, lz, rotY);
    [rlx, rly, rlz] = rotateX(rlx, rly, rlz, rotX);
    const lp = project3d(rlx * scale, rly * scale, rlz * scale);

    const gr = ctx.createRadialGradient(cx + lp.px, cy + lp.py, 0, cx + lp.px, cy + lp.py, 14);
    gr.addColorStop(0, isRight ? "rgba(255,80,80,0.6)" : "rgba(40,180,255,0.6)");
    gr.addColorStop(1, "rgba(0,0,0,0)");
    ctx.beginPath();
    ctx.arc(cx + lp.px, cy + lp.py, 14, 0, TAU);
    ctx.fillStyle = gr;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(cx + lp.px, cy + lp.py, 5.5, 0, TAU);
    ctx.fillStyle = isRight ? C.right : C.left;
    ctx.fill();
  }

  function drawHelixAxis(ctx, cx, cy, rotX, rotY, scale, tMin, tMax) {
    const pitch = 0.38;
    const z0 = (tMin - (tMin + tMax) / 2) * pitch * (tMax - tMin);
    const z1 = (tMax - (tMin + tMax) / 2) * pitch * (tMax - tMin);

    let [, , rz0] = rotateY(0, 0, z0, rotY);
    let [ax0, ay0] = rotateX(0, 0, rz0, rotX);
    let [, , rz1] = rotateY(0, 0, z1, rotY);
    let [ax1, ay1] = rotateX(0, 0, rz1, rotX);

    const p0 = project3d(ax0 * scale, ay0 * scale, rz0 * scale);
    const p1 = project3d(ax1 * scale, ay1 * scale, rz1 * scale);

    ctx.beginPath();
    ctx.moveTo(cx + p0.px, cy + p0.py);
    ctx.lineTo(cx + p1.px, cy + p1.py);
    ctx.strokeStyle = "rgba(100,150,220,0.3)";
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  const draw = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;
    const s = stateRef.current;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, W, H);

    if (autoRotate && view !== "rotation720") s.rotY += 0.006;
    if (view === "sterngerlach" && sgRunning) {
      s.sgAnim = Math.min(1, s.sgAnim + 0.008);
      if (s.sgAnim >= 1) setSgRunning(false);
    }

    const infoW = W * 0.26;
    const mainX = infoW + 10;
    const mainW = W - mainX - 16;

    // ---- CHIRALITY VIEW ----
    if (view === "chirality") {
      const drawBoth = handedness === "both";
      const positions = drawBoth
        ? [{ x: mainX + mainW * 0.3, isRight: true }, { x: mainX + mainW * 0.72, isRight: false }]
        : [{ x: mainX + mainW / 2, isRight: handedness === "right" }];

      positions.forEach(({ x, isRight }) => {
        const cy = H * 0.5;
        const scale = Math.min(mainW, H) * (drawBoth ? 0.11 : 0.14);
        if (showAxis) drawHelixAxis(ctx, x, cy, s.rotX, s.rotY, scale, 0, 6);
        drawHelix(ctx, x, cy, s.rotX, s.rotY, isRight, 1, scale, 0, 6, s.time, true);

        // Labels
        const color = isRight ? C.right : C.left;
        ctx.fillStyle = color;
        ctx.font = "bold 14px 'Courier New'";
        ctx.textAlign = "center";
        ctx.fillText(isRight ? "RIGHT-HANDED" : "LEFT-HANDED", x, cy - scale * 1.55);
        ctx.font = "bold 18px 'Courier New'";
        ctx.fillText(isRight ? "spin-up  ↑" : "spin-down  ↓", x, cy - scale * 1.3);
        ctx.font = "11px 'Courier New'";
        ctx.fillStyle = color.replace("ff5555", "ff8888").replace("44aaff", "88ccff");
        ctx.fillText(isRight ? "clockwise advance" : "counter-clockwise advance", x, cy + scale * 1.45);
        ctx.fillStyle = "rgba(120,160,210,0.4)";
        ctx.font = "10px 'Courier New'";
        ctx.fillText(isRight ? "∂e/∂t > 0" : "∂e/∂t < 0", x, cy + scale * 1.62);
        ctx.textAlign = "left";
      });

      // Mirror arrow between them
      if (drawBoth) {
        const mx = mainX + mainW / 2;
        const my = H * 0.5;
        ctx.fillStyle = "rgba(150,180,220,0.3)";
        ctx.font = "bold 22px 'Courier New'";
        ctx.textAlign = "center";
        ctx.fillText("⟺", mx, my + 6);
        ctx.font = "10px 'Courier New'";
        ctx.fillStyle = "rgba(120,160,200,0.35)";
        ctx.fillText("mirror image", mx, my + 22);
        ctx.fillText("(chirality flip)", mx, my + 36);
        ctx.textAlign = "left";
      }
    }

    // ---- 720° ROTATION VIEW ----
    if (view === "rotation720") {
      const cx = mainX + mainW / 2;
      const cy = H * 0.5;
      const scale = Math.min(mainW, H) * 0.11;

      // Draw the helix with a rotation offset showing current rotation
      const baseRotY = s.rotY + (rotDeg / 180) * Math.PI;

      if (showAxis) drawHelixAxis(ctx, cx, cy, s.rotX, baseRotY, scale, 0, 5);
      drawHelix(ctx, cx, cy, s.rotX, baseRotY, true, 1, scale, 0, 5, s.time, false);

      // Phase indicator
      const normalizedPhase = (rotDeg % 720) / 720;
      const phaseAngle = normalizedPhase * TAU;
      const phaseR = 40;
      const phaseCx = mainX + mainW * 0.85;
      const phaseCy = H * 0.35;

      // Phase circle
      ctx.beginPath();
      ctx.arc(phaseCx, phaseCy, phaseR, 0, TAU);
      ctx.strokeStyle = "rgba(60,100,180,0.3)";
      ctx.lineWidth = 1;
      ctx.stroke();

      // Phase dot
      ctx.beginPath();
      ctx.arc(
        phaseCx + phaseR * Math.cos(phaseAngle - Math.PI / 2),
        phaseCy + phaseR * Math.sin(phaseAngle - Math.PI / 2),
        6, 0, TAU
      );
      const phaseColor = rotDeg % 720 < 360 ? C.right : "rgba(180,80,255,0.9)";
      ctx.fillStyle = phaseColor;
      ctx.fill();

      // Phase labels
      ctx.textAlign = "center";
      ctx.fillStyle = "rgba(180,200,235,0.6)";
      ctx.font = "bold 11px 'Courier New'";
      ctx.fillText("e-phase", phaseCx, phaseCy - phaseR - 10);
      ctx.fillStyle = phaseColor;
      ctx.font = "bold 13px 'Courier New'";
      ctx.fillText(`${(normalizedPhase * 360).toFixed(0)}°`, phaseCx, phaseCy + 5);
      ctx.textAlign = "left";

      // Rotation status
      const isBack = Math.abs(rotDeg % 720) < 5 && rotDeg > 0;
      const halfway = Math.abs((rotDeg % 720) - 360) < 5;

      ctx.textAlign = "center";
      const statusX = mainX + mainW / 2;

      ctx.fillStyle = "rgba(160,200,240,0.55)";
      ctx.font = "12px 'Courier New'";
      ctx.fillText(`Spatial rotation: ${rotDeg}°`, statusX, cy - scale * 1.6);

      if (rotDeg < 360) {
        ctx.fillStyle = C.right;
        ctx.font = "bold 13px 'Courier New'";
        ctx.fillText("e-phase: 0° → 180°  (halfway through e-cycle)", statusX, cy + scale * 1.55);
        ctx.fillStyle = "rgba(255,100,100,0.45)";
        ctx.font = "10px 'Courier New'";
        ctx.fillText("After 360° spatial rotation — state is INVERTED in e", statusX, cy + scale * 1.72);
      } else if (rotDeg < 720) {
        ctx.fillStyle = "rgba(180,80,255,0.85)";
        ctx.font = "bold 13px 'Courier New'";
        ctx.fillText("e-phase: 180° → 360°  (completing e-cycle)", statusX, cy + scale * 1.55);
        ctx.fillStyle = "rgba(160,80,255,0.5)";
        ctx.font = "10px 'Courier New'";
        ctx.fillText("Need full 720° to return to original state", statusX, cy + scale * 1.72);
      }
      if (isBack && rotDeg > 0) {
        ctx.fillStyle = "rgba(80,255,160,0.9)";
        ctx.font = "bold 14px 'Courier New'";
        ctx.fillText("✓  Back to original state after 720°", statusX, cy + scale * 1.9);
      }
      ctx.textAlign = "left";

      // Rotation slider is controlled by the rotDeg state
    }

    // ---- STERN-GERLACH VIEW ----
    if (view === "sterngerlach") {
      const anim = s.sgAnim;

      // Magnet poles
      const magLeft = mainX + mainW * 0.08;
      const magRight = mainX + mainW * 0.42;
      const magTop = H * 0.18;
      const magBot = H * 0.82;
      const gapY = H * 0.5;
      const gapH = H * 0.16;

      // North pole (top)
      ctx.fillStyle = "rgba(255,180,40,0.12)";
      ctx.fillRect(magLeft, magTop, magRight - magLeft, gapY - gapH / 2 - magTop);
      ctx.strokeStyle = "rgba(255,180,40,0.35)";
      ctx.lineWidth = 1;
      ctx.strokeRect(magLeft, magTop, magRight - magLeft, gapY - gapH / 2 - magTop);
      ctx.fillStyle = "rgba(255,180,40,0.55)";
      ctx.font = "bold 14px 'Courier New'";
      ctx.textAlign = "center";
      ctx.fillText("N", (magLeft + magRight) / 2, magTop + 22);

      // South pole (bottom)
      ctx.fillStyle = "rgba(255,180,40,0.12)";
      ctx.fillRect(magLeft, gapY + gapH / 2, magRight - magLeft, magBot - (gapY + gapH / 2));
      ctx.strokeStyle = "rgba(255,180,40,0.35)";
      ctx.strokeRect(magLeft, gapY + gapH / 2, magRight - magLeft, magBot - (gapY + gapH / 2));
      ctx.fillStyle = "rgba(255,180,40,0.45)";
      ctx.fillText("S", (magLeft + magRight) / 2, magBot - 10);
      ctx.textAlign = "left";

      // Field gradient lines
      for (let fi = 0; fi < 6; fi++) {
        const fy = (gapY - gapH / 2 + 10) + fi * (gapH - 20) / 5;
        ctx.beginPath();
        ctx.moveTo(magLeft + 10, fy);
        ctx.lineTo(magRight - 10, fy);
        ctx.strokeStyle = `rgba(255,200,40,${0.08 + fi * 0.02})`;
        ctx.lineWidth = 0.8;
        ctx.setLineDash([3, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Field label
      ctx.fillStyle = "rgba(255,200,40,0.4)";
      ctx.font = "10px 'Courier New'";
      ctx.fillText("∇B", magLeft + 4, gapY - 4);

      // Particles entering
      const entryX = mainX + mainW * 0.05;
      const numParticles = 8;
      const particlesX = mainX + mainW * 0.5;
      const exitX = mainX + mainW * 0.88;

      for (let pi = 0; pi < numParticles; pi++) {
        const t = pi / numParticles;
        const entryY = H * 0.35 + pi * H * 0.04;
        const isRight2 = pi % 2 === 0;

        // Particle trajectory
        const pProgress = Math.max(0, Math.min(1, anim * 1.6 - t * 0.5));

        if (pProgress > 0) {
          // Up to magnet
          const inMagX = Math.min(magLeft, entryX + pProgress * (particlesX - entryX));
          ctx.beginPath();
          ctx.moveTo(entryX, entryY);
          ctx.lineTo(inMagX, entryY);
          ctx.strokeStyle = isRight2
            ? `rgba(255,80,80,${0.7})`
            : `rgba(40,160,255,${0.7})`;
          ctx.lineWidth = 1.5;
          ctx.stroke();

          // Through and after magnet with deflection
          if (pProgress > 0.45) {
            const postProgress = (pProgress - 0.45) / 0.55;
            const deflect = isRight2 ? -1 : 1;
            const curveX = magLeft + postProgress * (exitX - magLeft);
            const curveY = entryY + deflect * postProgress * postProgress * H * 0.22;

            ctx.beginPath();
            ctx.moveTo(magLeft, entryY);

            for (let ci = 0; ci <= 30; ci++) {
              const cp = ci / 30 * postProgress;
              const ccx = magLeft + cp * (exitX - magLeft);
              const ccy = entryY + deflect * cp * cp * H * 0.22;
              ci === 0 ? ctx.moveTo(ccx, ccy) : ctx.lineTo(ccx, ccy);
            }
            ctx.strokeStyle = isRight2
              ? `rgba(255,80,80,0.8)`
              : `rgba(40,160,255,0.8)`;
            ctx.lineWidth = 1.8;
            ctx.stroke();

            // Particle dot at tip
            const finalX = magLeft + postProgress * (exitX - magLeft);
            const finalY = entryY + deflect * postProgress * postProgress * H * 0.22;
            ctx.beginPath();
            ctx.arc(finalX, finalY, 5, 0, TAU);
            ctx.fillStyle = isRight2 ? C.right : C.left;
            ctx.fill();
          }
        }
      }

      // Labels for deflection
      if (anim > 0.6) {
        ctx.globalAlpha = Math.min(1, (anim - 0.6) / 0.3);
        ctx.fillStyle = C.right;
        ctx.font = "bold 13px 'Courier New'";
        ctx.fillText("spin-up (right-handed)", exitX + 10, H * 0.28);
        ctx.font = "10px 'Courier New'";
        ctx.fillStyle = "rgba(255,120,120,0.5)";
        ctx.fillText("↑ deflected up by ∇B", exitX + 10, H * 0.28 + 16);

        ctx.fillStyle = C.left;
        ctx.font = "bold 13px 'Courier New'";
        ctx.fillText("spin-down (left-handed)", exitX + 10, H * 0.74);
        ctx.font = "10px 'Courier New'";
        ctx.fillStyle = "rgba(80,180,255,0.5)";
        ctx.fillText("↓ deflected down by ∇B", exitX + 10, H * 0.74 + 16);

        ctx.fillStyle = "rgba(160,200,240,0.35)";
        ctx.font = "10px 'Courier New'";
        ctx.fillText("Only 2 outcomes —", exitX + 10, H * 0.5 - 8);
        ctx.fillText("only 2 chiralities.", exitX + 10, H * 0.5 + 6);
        ctx.globalAlpha = 1;
      }

      // Entry label
      ctx.fillStyle = "rgba(160,200,240,0.4)";
      ctx.font = "10px 'Courier New'";
      ctx.fillText("beam →", entryX, H * 0.35 - 10);
      ctx.fillText("(mixed chiralities)", entryX, H * 0.35 + 4);
    }

    // ---- INFO PANEL ----
    ctx.fillStyle = C.panelBg;
    ctx.fillRect(0, 0, infoW, H);
    ctx.strokeStyle = "rgba(35,65,125,0.2)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(infoW, 0);
    ctx.lineTo(infoW, H);
    ctx.stroke();

    const ip = { x: 14, y: 20 };
    ctx.fillStyle = "rgba(255,100,100,0.8)";
    ctx.font = "bold 13px 'Courier New'";
    ctx.fillText("SPIN = CHIRALITY", ip.x, ip.y + 14);
    ctx.fillStyle = C.textDim;
    ctx.font = "10px 'Courier New'";
    ctx.fillText("handedness of the helix", ip.x, ip.y + 28);

    const lines = view === "chirality"
      ? [
          "Spin is NOT a particle",
          "rotating in 3D space.",
          "",
          "It IS the handedness",
          "of the particle's helix",
          "through 5D spacetime.",
          "",
          "Right-handed → spin-up",
          "Left-handed → spin-down",
          "",
          "Only two chiralities",
          "→ only two spin states.",
          "",
          "Magnetic moments arise",
          "from helical circulation",
          "in (space + e).",
        ]
      : view === "rotation720"
      ? [
          "Why 720° to return?",
          "",
          "e-dimension is circular:",
          "periodic 0 → 2π",
          "",
          "360° spatial rotation",
          "= π shift in e",
          "(halfway around e-cycle)",
          "",
          "→ state is INVERTED",
          "→ need another 360°",
          "to complete e-cycle",
          "",
          "720° total = 1 full",
          "cycle in e-space.",
          "",
          "Drag the slider →",
        ]
      : [
          "Stern-Gerlach (1922):",
          "",
          "Classical prediction:",
          "continuous deflection",
          "distribution.",
          "",
          "Quantum reality:",
          "only 2 discrete spots.",
          "",
          "5D explanation:",
          "field couples to",
          "helical chirality.",
          "",
          "Right-handed → up",
          "Left-handed → down",
          "",
          "2 chiralities = 2 spots.",
        ];

    ctx.fillStyle = C.textDim;
    ctx.font = "11px 'Courier New'";
    lines.forEach((l, i) => ctx.fillText(l, ip.x, ip.y + 55 + i * 16));

    s.time += 0.016;
    animRef.current = requestAnimationFrame(draw);
  }, [view, handedness, autoRotate, showAxis, sgRunning, rotDeg]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    resize();
    window.addEventListener("resize", resize);
    animRef.current = requestAnimationFrame(draw);
    return () => { cancelAnimationFrame(animRef.current); window.removeEventListener("resize", resize); };
  }, [draw]);

  // Mouse drag
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const onDown = e => { dragging.current = true; lastMouse.current = { x: e.clientX, y: e.clientY }; setAutoRotate(false); stateRef.current.rotY; };
    const onMove = e => {
      if (!dragging.current) return;
      const dx = e.clientX - lastMouse.current.x;
      const dy = e.clientY - lastMouse.current.y;
      stateRef.current.rotY += dx * 0.009;
      stateRef.current.rotX += dy * 0.009;
      lastMouse.current = { x: e.clientX, y: e.clientY };
    };
    const onUp = () => { dragging.current = false; };
    canvas.addEventListener("mousedown", onDown);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => { canvas.removeEventListener("mousedown", onDown); window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, []);

  const label = { fontSize: 10, letterSpacing: "0.14em", color: "rgba(75,120,175,0.5)", textTransform: "uppercase", fontFamily: "'Courier New', monospace", display: "block", marginBottom: 5 };
  const btn = (active, col) => ({
    padding: "5px 12px", fontSize: 11, letterSpacing: "0.06em", fontFamily: "'Courier New', monospace",
    background: active ? `rgba(${col},0.18)` : "rgba(12,20,40,0.7)",
    border: `1px solid ${active ? `rgba(${col},0.55)` : "rgba(30,60,120,0.22)"}`,
    color: active ? `rgba(${col},1)` : "rgba(95,140,190,0.5)",
    borderRadius: 3, cursor: "pointer",
  });

  return (
    <div style={{ background: C.bg, minHeight: "100vh", display: "flex", flexDirection: "column", fontFamily: "'Courier New', monospace", color: C.text, userSelect: "none" }}>

      <div style={{ padding: "15px 26px 9px", borderBottom: "1px solid rgba(30,60,120,0.18)", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span style={{ fontSize: 11, letterSpacing: "0.18em", color: "rgba(255,100,100,0.4)", textTransform: "uppercase" }}>Quantum Geometry in 5D</span>
        <span style={{ color: "rgba(45,80,140,0.3)" }}>|</span>
        <span style={{ fontSize: 13, color: "rgba(185,215,245,0.65)", letterSpacing: "0.05em" }}>Visualization 05 — Spin as Helical Chirality</span>
      </div>

      <canvas ref={canvasRef} style={{ flex: 1, width: "100%", display: "block", cursor: "grab" }} />

      <div style={{ padding: "13px 26px 17px", borderTop: "1px solid rgba(30,60,120,0.15)", display: "flex", flexWrap: "wrap", gap: "15px 30px", alignItems: "flex-start", background: "rgba(5,7,9,0.98)" }}>

        {/* View mode */}
        <div>
          <span style={label}>Scene</span>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={() => setView("chirality")} style={btn(view === "chirality", "255,100,100")}>Chirality</button>
            <button onClick={() => setView("rotation720")} style={btn(view === "rotation720", "180,80,255")}>720° Mystery</button>
            <button onClick={() => setView("sterngerlach")} style={btn(view === "sterngerlach", "255,200,40")}>Stern-Gerlach</button>
          </div>
        </div>

        {/* Chirality selector */}
        {view === "chirality" && (
          <div>
            <span style={label}>Show</span>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => setHandedness("right")} style={btn(handedness === "right", "255,80,80")}>↑ Spin-up</button>
              <button onClick={() => setHandedness("left")} style={btn(handedness === "left", "40,160,255")}>↓ Spin-down</button>
              <button onClick={() => setHandedness("both")} style={btn(handedness === "both", "180,200,240")}>Both</button>
            </div>
          </div>
        )}

        {/* 720 rotation slider */}
        {view === "rotation720" && (
          <div>
            <span style={label}>Spatial rotation (drag to rotate)</span>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 11, color: "rgba(160,100,255,0.5)", width: 18 }}>0°</span>
              <input type="range" min={0} max={720} step={1} value={rotDeg}
                onChange={e => setRotDeg(Number(e.target.value))}
                style={{ width: 220, accentColor: "#b050ff", cursor: "pointer" }} />
              <span style={{ fontSize: 11, color: "rgba(160,100,255,0.5)", width: 28 }}>720°</span>
              <span style={{ fontSize: 12, color: "rgba(180,120,255,0.85)", background: "rgba(40,10,60,0.4)", border: "1px solid rgba(160,80,255,0.25)", padding: "2px 9px", borderRadius: 3, minWidth: 46, textAlign: "center" }}>
                {rotDeg}°
              </span>
            </div>
          </div>
        )}

        {/* SG controls */}
        {view === "sterngerlach" && (
          <div style={{ display: "flex", gap: 8, alignItems: "flex-end", paddingBottom: 1 }}>
            <button onClick={startSG} style={{ ...btn(true, "255,200,40"), fontWeight: "bold" }}>▷ Fire beam</button>
            <button onClick={() => { stateRef.current.sgAnim = 0; setSgRunning(false); }} style={btn(false, "100,150,220")}>↺ Reset</button>
          </div>
        )}

        {/* Global toggles */}
        <div style={{ display: "flex", gap: 8, alignItems: "flex-end", paddingBottom: 1 }}>
          {view === "chirality" && (
            <>
              <button onClick={() => setShowAxis(v => !v)} style={btn(showAxis, "100,150,220")}>Axis {showAxis ? "on" : "off"}</button>
              <button onClick={() => setAutoRotate(v => !v)} style={btn(autoRotate, "80,200,160")}>{autoRotate ? "⟳ rotating" : "▷ rotate"}</button>
              <span style={{ fontSize: 10, color: "rgba(60,100,150,0.4)", alignSelf: "center", marginLeft: 4 }}>drag to rotate</span>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(SpinChirality));
</script>
</body>
</html>
