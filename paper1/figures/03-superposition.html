<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>superposition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f8f9fa; font-family: system-ui, -apple-system, sans-serif; }
  #root { width: 100%; max-width: 900px; padding: 20px; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useRef, useEffect, useState, useCallback, useMemo } = React;


const TAU = Math.PI * 2;

const C = {
  bg: "#060810",
  panelBg: "rgba(8,11,20,0.95)",
  grid: "rgba(30,50,90,0.3)",
  eAxis: "rgba(80,220,160,0.7)",
  xAxis: "rgba(100,160,255,0.6)",
  state0: "#4af",        // state |0⟩ — blue
  state0Glow: "rgba(40,170,255,0.15)",
  state1: "#f84",        // state |1⟩ — orange
  state1Glow: "rgba(255,130,40,0.15)",
  collapsed: "#c0ffa0",  // measurement result — green
  text: "rgba(170,200,235,0.75)",
  textDim: "rgba(90,130,175,0.45)",
  measure: "rgba(255,220,60,0.85)",
};

function lerp(a, b, t) { return a + (b - a) * t; }
function gaussian(x, mu, sigma) { return Math.exp(-0.5 * ((x - mu) / sigma) ** 2); }

function SuperpositionExtension() {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const stateRef = useRef({ time: 0, collapseAnim: 0, collapsed: false, collapsedTo: 0 });

  const [alpha2, setAlpha2] = useState(50);   // |α|² as percent for state |0⟩
  const [measured, setMeasured] = useState(false);
  const [measureResult, setMeasureResult] = useState(null);
  const [view, setView] = useState("5d");      // "5d" | "4d" | "split"
  const [showAmplitude, setShowAmplitude] = useState(true);
  const [coherent, setCoherent] = useState(true);

  const alpha = Math.sqrt(alpha2 / 100);
  const beta = Math.sqrt(1 - alpha2 / 100);

  const doMeasure = useCallback(() => {
    const result = Math.random() < alpha2 / 100 ? 0 : 1;
    setMeasureResult(result);
    setMeasured(true);
    stateRef.current.collapsed = true;
    stateRef.current.collapseAnim = 0;
    stateRef.current.collapsedTo = result;
  }, [alpha2]);

  const reset = () => {
    setMeasured(false);
    setMeasureResult(null);
    stateRef.current.collapsed = false;
    stateRef.current.collapseAnim = 0;
  };

  const draw = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;
    const s = stateRef.current;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, W, H);

    if (s.collapsed && s.collapseAnim < 1) s.collapseAnim = Math.min(1, s.collapseAnim + 0.025);

    // ---- LAYOUT ----
    const infoW = W * 0.28;
    const mainX = infoW + 10;
    const mainW = W - mainX - 20;
    const cx = mainX + mainW / 2;

    // e-axis: vertical center, x-axis: horizontal
    // We'll show the e-dimension as vertical (the "hidden" dimension)
    // and x as horizontal, plus a "depth" illusion for the 3rd spatial dim

    // Coordinate system
    const ox = mainX + 40;
    const oy = H * 0.5;
    const eScale = H * 0.22;    // e dimension spans ±eScale pixels
    const xScale = mainW - 70;

    // e-values for the two states
    // State |0⟩ lives at e ≈ +0.6 (upper region of e-axis)
    // State |1⟩ lives at e ≈ -0.6 (lower region of e-axis)
    const e0 = 0.62;   // e-position of state |0⟩
    const e1 = -0.62;  // e-position of state |1⟩
    const eWidth = 0.28; // spread of each state in e

    // Collapse animation
    const ca = s.collapseAnim;
    const collTo = s.collapsedTo;

    // ---- GRID ----
    ctx.strokeStyle = C.grid;
    ctx.lineWidth = 0.5;
    for (let yi = -4; yi <= 4; yi++) {
      ctx.beginPath();
      ctx.moveTo(ox, oy + yi * eScale * 0.28);
      ctx.lineTo(ox + xScale, oy + yi * eScale * 0.28);
      ctx.stroke();
    }
    for (let xi = 0; xi <= 8; xi++) {
      ctx.beginPath();
      ctx.moveTo(ox + (xi / 8) * xScale, oy - eScale * 1.4);
      ctx.lineTo(ox + (xi / 8) * xScale, oy + eScale * 1.4);
      ctx.stroke();
    }

    // ---- AXES ----
    // e-axis (vertical)
    ctx.beginPath();
    ctx.moveTo(ox - 20, oy + eScale * 1.3);
    ctx.lineTo(ox - 20, oy - eScale * 1.3);
    ctx.strokeStyle = C.eAxis;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // arrow
    ctx.beginPath();
    ctx.moveTo(ox - 20, oy - eScale * 1.3);
    ctx.lineTo(ox - 25, oy - eScale * 1.3 + 10);
    ctx.lineTo(ox - 15, oy - eScale * 1.3 + 10);
    ctx.closePath();
    ctx.fillStyle = C.eAxis;
    ctx.fill();
    ctx.fillStyle = C.eAxis;
    ctx.font = "bold 12px 'Courier New'";
    ctx.save(); ctx.translate(ox - 36, oy); ctx.rotate(-Math.PI / 2);
    ctx.fillText("e  (5th dimension)", -60, 0);
    ctx.restore();

    // x-axis (horizontal)
    ctx.beginPath();
    ctx.moveTo(ox, oy + eScale * 1.32);
    ctx.lineTo(ox + xScale + 10, oy + eScale * 1.32);
    ctx.strokeStyle = C.xAxis;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ox + xScale + 10, oy + eScale * 1.32);
    ctx.lineTo(ox + xScale, oy + eScale * 1.32 + 5);
    ctx.lineTo(ox + xScale, oy + eScale * 1.32 - 5);
    ctx.closePath();
    ctx.fillStyle = C.xAxis;
    ctx.fill();
    ctx.fillStyle = C.xAxis;
    ctx.font = "11px 'Courier New'";
    ctx.fillText("x  (space)", ox + xScale - 30, oy + eScale * 1.32 + 18);

    // ---- DRAW THE PARTICLE'S 5D STRUCTURE ----
    // The particle is a "blob" in (x, e) space
    // State |0⟩: blob at e = +e0, amplitude = alpha
    // State |1⟩: blob at e = -e1, amplitude = beta

    const numX = 300;
    const numE = 200;

    // Draw density as a heatmap-style fill
    // For each e-slice, draw a horizontal colored band

    const eMin = -1.1, eMax = 1.1;

    if (view !== "4d") {
      for (let ei = 0; ei < numE; ei++) {
        const eFrac = ei / numE;
        const eVal = eMin + eFrac * (eMax - eMin);
        const ePx = oy - eVal * eScale;

        // Density at this e-value from each state
        let d0 = alpha ** 2 * gaussian(eVal, e0, eWidth);
        let d1 = beta ** 2 * gaussian(eVal, e1, eWidth);

        // Coherence term (interference in e)
        let dCross = 0;
        if (coherent) {
          dCross = 2 * alpha * beta * gaussian(eVal, (e0 + e1) / 2, eWidth * 0.8)
            * Math.cos(s.time * 1.2 + eVal * 4);
        }

        // Apply collapse animation
        if (s.collapsed) {
          if (collTo === 0) { d1 *= (1 - ca); dCross *= (1 - ca); }
          else { d0 *= (1 - ca); dCross *= (1 - ca); }
        }

        const totalD = d0 + d1 + dCross;

        // x-extent: spread across all x for now (delocalized in x)
        const xExtent = xScale * 0.85;
        const xStart = ox + xScale * 0.075;

        // Color blend: state 0 = blue, state 1 = orange
        const d0n = d0 / (d0 + d1 + 0.001);
        const r = Math.round(lerp(40, 255, d0n < 0.5 ? 0 : (d0n - 0.5) * 2));
        const g = Math.round(lerp(130, 170, d0n));
        const b = Math.round(lerp(255, 40, d0n));

        const alpha_px = Math.min(0.85, totalD * 2.2);
        if (alpha_px < 0.01) continue;

        ctx.beginPath();
        ctx.moveTo(xStart, ePx);
        ctx.lineTo(xStart + xExtent, ePx);
        ctx.strokeStyle = `rgba(${r},${g},${b},${alpha_px})`;
        ctx.lineWidth = (eMax - eMin) / numE * eScale * 1.8;
        ctx.stroke();
      }

      // State labels on e-axis
      if (!s.collapsed || collTo === 0) {
        const e0py = oy - e0 * eScale;
        const alphaFade = s.collapsed && collTo === 1 ? (1 - ca) : 1;
        ctx.globalAlpha = alphaFade;
        ctx.fillStyle = C.state0;
        ctx.font = "bold 12px 'Courier New'";
        ctx.fillText("|0⟩", ox - 18, e0py - eScale * eWidth * 1.1 - 6);
        ctx.fillStyle = "rgba(40,170,255,0.4)";
        ctx.font = "10px 'Courier New'";
        ctx.fillText(`|α|² = ${(alpha ** 2 * 100).toFixed(0)}%`, ox - 18, e0py - eScale * eWidth * 1.1 - 20);
        ctx.globalAlpha = 1;
      }

      if (!s.collapsed || collTo === 1) {
        const e1py = oy - e1 * eScale;
        const betaFade = s.collapsed && collTo === 0 ? (1 - ca) : 1;
        ctx.globalAlpha = betaFade;
        ctx.fillStyle = C.state1;
        ctx.font = "bold 12px 'Courier New'";
        ctx.fillText("|1⟩", ox - 18, e1py + eScale * eWidth * 1.1 + 16);
        ctx.fillStyle = "rgba(255,130,40,0.4)";
        ctx.font = "10px 'Courier New'";
        ctx.fillText(`|β|² = ${(beta ** 2 * 100).toFixed(0)}%`, ox - 18, e1py + eScale * eWidth * 1.1 + 30);
        ctx.globalAlpha = 1;
      }

      // E-axis tick marks for the two states
      [e0, e1].forEach((ev, i) => {
        const epy = oy - ev * eScale;
        ctx.beginPath();
        ctx.moveTo(ox - 25, epy);
        ctx.lineTo(ox - 15, epy);
        ctx.strokeStyle = i === 0 ? "rgba(40,170,255,0.5)" : "rgba(255,130,40,0.5)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
      });

      // Measurement "slice" line
      if (s.collapsed && ca > 0.3) {
        const sliceE = collTo === 0 ? e0 : e1;
        const slicePy = oy - sliceE * eScale;
        ctx.globalAlpha = Math.min(1, (ca - 0.3) / 0.4);
        ctx.beginPath();
        ctx.moveTo(ox, slicePy);
        ctx.lineTo(ox + xScale, slicePy);
        ctx.strokeStyle = C.measure;
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = C.measure;
        ctx.font = "bold 11px 'Courier New'";
        ctx.fillText(`← 4D observer samples e = ${collTo === 0 ? "e₀" : "e₁"}`, ox + xScale * 0.3, slicePy - 8);
        ctx.globalAlpha = 1;
      }
    }

    // ---- 4D PROJECTION (what observer sees) ----
    // Project the 5D blob onto x-axis (integrate over e)
    const proj4dY = oy + eScale * 1.6;

    // Draw projection axis
    ctx.beginPath();
    ctx.moveTo(ox, proj4dY);
    ctx.lineTo(ox + xScale, proj4dY);
    ctx.strokeStyle = "rgba(192,255,160,0.35)";
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = "rgba(192,255,160,0.5)";
    ctx.font = "10px 'Courier New'";
    ctx.fillText("4D projection (what we measure)", ox + xScale * 0.3, proj4dY + 16);

    // Probability density along x (integrated over e)
    // For simplicity: superposition means both states contribute to same x region
    // After measurement: only one state
    const projH = eScale * 0.35;
    for (let xi = 0; xi < 300; xi++) {
      const xFrac = xi / 300;
      const xVal = xFrac * 8;

      // Gaussian centered at x=4 — the particle is localized there
      const xDens = gaussian(xVal, 4.0, 1.2);

      let prob;
      if (!s.collapsed) {
        // Superposition: both states, same x probability
        prob = xDens * (alpha ** 2 + beta ** 2);  // = xDens * 1
      } else {
        prob = xDens; // collapsed to one state, same x distribution for simplicity
      }

      const ppx = ox + (xVal / 8) * xScale;
      const barH2 = prob * projH;

      const collapseColor = measureResult === 0 ? "40,170,255" : "255,130,40";
      const fillColor = s.collapsed
        ? `rgba(${collapseColor},${0.7 * Math.min(1, ca)})`
        : `rgba(140,200,255,0.55)`;

      ctx.beginPath();
      ctx.moveTo(ppx, proj4dY);
      ctx.lineTo(ppx, proj4dY - barH2);
      ctx.strokeStyle = fillColor;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // ---- DECOHERENCE effect ----
    if (!coherent && !s.collapsed) {
      ctx.fillStyle = "rgba(255,160,40,0.12)";
      ctx.fillRect(ox, oy - eScale * 1.3, xScale, eScale * 2.6);
      ctx.fillStyle = "rgba(255,160,40,0.6)";
      ctx.font = "bold 13px 'Courier New'";
      ctx.fillText("DECOHERENT — phase relationship lost", ox + xScale * 0.15, oy - eScale * 0.9);
      ctx.font = "11px 'Courier New'";
      ctx.fillStyle = "rgba(255,160,40,0.45)";
      ctx.fillText("States still exist in e — but e-structure is scrambled by environment", ox + xScale * 0.05, oy + eScale * 0.9);
    }

    // ---- INFO PANEL ----
    ctx.fillStyle = C.panelBg;
    ctx.fillRect(0, 0, infoW, H);
    ctx.strokeStyle = "rgba(40,80,140,0.2)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(infoW, 0);
    ctx.lineTo(infoW, H);
    ctx.stroke();

    const ip = { x: 16, y: 20 };

    ctx.fillStyle = "rgba(80,220,160,0.85)";
    ctx.font = "bold 13px 'Courier New'";
    ctx.fillText("SUPERPOSITION", ip.x, ip.y + 14);
    ctx.fillStyle = C.textDim;
    ctx.font = "10px 'Courier New'";
    ctx.fillText("= extension in e-dimension", ip.x, ip.y + 28);

    // State equation
    const eqY = ip.y + 58;
    ctx.fillStyle = "rgba(170,210,250,0.6)";
    ctx.font = "13px 'Courier New'";
    ctx.fillText("|ψ⟩ =", ip.x, eqY);
    ctx.fillStyle = C.state0;
    ctx.fillText(`${alpha.toFixed(2)}|0⟩`, ip.x + 46, eqY);
    ctx.fillStyle = "rgba(170,210,250,0.6)";
    ctx.fillText("+", ip.x + 46 + 52, eqY);
    ctx.fillStyle = C.state1;
    ctx.fillText(`${beta.toFixed(2)}|1⟩`, ip.x + 46 + 68, eqY);

    // Amplitudes as bars
    const barY = eqY + 20;
    const bW = infoW - ip.x * 2 - 8;

    [[alpha ** 2, C.state0, "|0⟩", `${(alpha ** 2 * 100).toFixed(0)}%`],
     [beta ** 2, C.state1, "|1⟩", `${(beta ** 2 * 100).toFixed(0)}%`]
    ].forEach(([prob, color, label, pct], i) => {
      const by = barY + i * 28;
      ctx.fillStyle = "rgba(20,35,60,0.6)";
      ctx.fillRect(ip.x, by, bW, 14);
      ctx.fillStyle = color.replace(")", ",0.7)").replace("rgb(", "rgba(").replace("#4af", "rgba(40,170,255,0.7)").replace("#f84", "rgba(255,130,40,0.7)");
      ctx.fillStyle = i === 0 ? "rgba(40,170,255,0.65)" : "rgba(255,130,40,0.65)";
      ctx.fillRect(ip.x, by, bW * prob, 14);
      ctx.fillStyle = i === 0 ? C.state0 : C.state1;
      ctx.font = "bold 10px 'Courier New'";
      ctx.fillText(`${label} ${pct}`, ip.x + 4, by + 10);
    });

    // Measurement result
    if (s.collapsed) {
      const resY = barY + 80;
      ctx.fillStyle = "rgba(255,220,60,0.15)";
      ctx.fillRect(ip.x - 4, resY - 16, infoW - ip.x + 4, 60);
      ctx.strokeStyle = "rgba(255,220,60,0.4)";
      ctx.lineWidth = 1;
      ctx.strokeRect(ip.x - 4, resY - 16, infoW - ip.x + 4, 60);
      ctx.globalAlpha = Math.min(1, ca * 2);
      ctx.fillStyle = C.measure;
      ctx.font = "bold 12px 'Courier New'";
      ctx.fillText("MEASURED:", ip.x, resY);
      ctx.fillStyle = measureResult === 0 ? C.state0 : C.state1;
      ctx.font = "bold 20px 'Courier New'";
      ctx.fillText(`|${measureResult}⟩`, ip.x, resY + 26);
      ctx.fillStyle = "rgba(180,220,160,0.6)";
      ctx.font = "10px 'Courier New'";
      ctx.fillText("4D slice at e = e" + (measureResult === 0 ? "₀" : "₁"), ip.x, resY + 42);
      ctx.globalAlpha = 1;
    }

    // Explanation
    const expY2 = s.collapsed ? barY + 165 : barY + 95;
    const lines = s.collapsed
      ? [
          "'Collapse' is not a",
          "physical event.",
          "",
          "The 5D structure didn't",
          "change — we just learned",
          "which e-slice our 4D",
          "observation intersected.",
          "",
          "The other state still",
          "exists in 5D space,",
          "just not in our slice.",
        ]
      : coherent
      ? [
          "The particle is NOT in",
          "two places at once.",
          "",
          "It is one object,",
          "extended across two",
          "regions of the e-axis.",
          "",
          "From 4D (projecting",
          "over e), we see both",
          "states simultaneously.",
          "",
          "Measure → learn which",
          "e-value we sampled.",
        ]
      : [
          "Decoherence = the",
          "particle's e-structure",
          "gets entangled with",
          "the environment.",
          "",
          "Phase relationships",
          "are scrambled.",
          "",
          "States still exist —",
          "but interference is",
          "washed out.",
        ];

    ctx.fillStyle = C.textDim;
    ctx.font = "11px 'Courier New'";
    lines.forEach((line, i) => ctx.fillText(line, ip.x, expY2 + i * 16));

    s.time += 0.016;
    animRef.current = requestAnimationFrame(draw);
  }, [alpha, beta, alpha2, view, showAmplitude, coherent, measured, measureResult]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    resize();
    window.addEventListener("resize", resize);
    animRef.current = requestAnimationFrame(draw);
    return () => { cancelAnimationFrame(animRef.current); window.removeEventListener("resize", resize); };
  }, [draw]);

  const label = { fontSize: 10, letterSpacing: "0.14em", color: "rgba(90,140,190,0.5)", textTransform: "uppercase", fontFamily: "'Courier New', monospace", display: "block", marginBottom: 5 };
  const btn = (active, col) => ({
    padding: "5px 13px", fontSize: 11, letterSpacing: "0.06em", fontFamily: "'Courier New', monospace",
    background: active ? `rgba(${col},0.18)` : "rgba(16,28,52,0.6)",
    border: `1px solid ${active ? `rgba(${col},0.55)` : "rgba(40,80,140,0.22)"}`,
    color: active ? `rgba(${col},1)` : "rgba(110,150,195,0.5)",
    borderRadius: 3, cursor: "pointer",
  });

  return (
    <div style={{ background: C.bg, minHeight: "100vh", display: "flex", flexDirection: "column", fontFamily: "'Courier New', monospace", color: C.text, userSelect: "none" }}>

      <div style={{ padding: "15px 26px 9px", borderBottom: "1px solid rgba(40,80,140,0.18)", display: "flex", alignItems: "baseline", gap: 14 }}>
        <span style={{ fontSize: 11, letterSpacing: "0.18em", color: "rgba(80,220,160,0.4)", textTransform: "uppercase" }}>Quantum Geometry in 5D</span>
        <span style={{ color: "rgba(60,100,160,0.3)" }}>|</span>
        <span style={{ fontSize: 13, color: "rgba(190,215,240,0.65)", letterSpacing: "0.05em" }}>Visualization 03 — Superposition as e-Extension</span>
      </div>

      <canvas ref={canvasRef} style={{ flex: 1, width: "100%", display: "block" }} />

      <div style={{ padding: "13px 26px 17px", borderTop: "1px solid rgba(40,80,140,0.15)", display: "flex", flexWrap: "wrap", gap: "15px 32px", alignItems: "flex-start", background: "rgba(6,8,16,0.97)" }}>

        {/* Alpha slider */}
        <div>
          <span style={label}>Amplitude split  |α|² / |β|²</span>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 11, color: "rgba(40,170,255,0.6)", width: 22 }}>|0⟩</span>
            <input type="range" min={0} max={100} step={1} value={alpha2}
              onChange={e => { setAlpha2(Number(e.target.value)); reset(); }}
              style={{ width: 180, cursor: "pointer",
                accentColor: alpha2 > 50 ? "#4af" : "#f84" }} />
            <span style={{ fontSize: 11, color: "rgba(255,130,40,0.6)", width: 22 }}>|1⟩</span>
            <span style={{ fontSize: 11, color: "rgba(180,210,240,0.6)", background: "rgba(20,35,60,0.5)", border: "1px solid rgba(60,100,160,0.25)", padding: "2px 8px", borderRadius: 3, minWidth: 80, textAlign: "center" }}>
              {alpha2}% / {100 - alpha2}%
            </span>
          </div>
        </div>

        {/* Measure button */}
        <div>
          <span style={label}>Measurement</span>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={doMeasure} disabled={measured}
              style={{ ...btn(!measured, "255,220,60"), opacity: measured ? 0.4 : 1, fontWeight: "bold" }}>
              ⚡ Measure
            </button>
            <button onClick={reset} style={btn(false, "120,160,220")}>
              ↺ Reset
            </button>
          </div>
        </div>

        {/* Coherence */}
        <div>
          <span style={label}>Coherence</span>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setCoherent(true)} style={btn(coherent, "80,220,160")}>Coherent</button>
            <button onClick={() => setCoherent(false)} style={btn(!coherent, "255,160,40")}>Decoherent</button>
          </div>
        </div>

        <span style={{ fontSize: 10, color: "rgba(60,100,150,0.4)", letterSpacing: "0.07em", marginLeft: "auto", alignSelf: "flex-end", paddingBottom: 2 }}>
          vertical axis = e (5th dimension) · color = state identity
        </span>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(SuperpositionExtension));
</script>
</body>
</html>
