<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The e-Circle — Clifford Torus Viewer (Paper 60)</title>
<style>
  :root{
    --bg:#0a0a14;
    --panel:#12121f;
    --panel2:#1a1a2e;
    --border:#242438;
    --text:#e8e8f0;
    --dim:#8a8aa0;
    --accent:#f5c26b;
    --warm:#ff6b5a;
    --cool:#5ab0ff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;overflow:hidden}
  #app{display:grid;grid-template-columns:65% 35%;grid-template-rows:1fr 120px;height:100vh;width:100vw}
  #canvas-wrap{grid-column:1;grid-row:1;position:relative;background:radial-gradient(ellipse at center,#12122a 0%,#0a0a14 70%)}
  #canvas-wrap canvas{display:block;width:100%;height:100%}
  #tooltip{position:absolute;pointer-events:none;background:rgba(20,20,35,0.95);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;display:none;z-index:10;white-space:nowrap}
  #panel{grid-column:2;grid-row:1;background:var(--panel);border-left:1px solid var(--border);padding:24px 22px;overflow-y:auto;font-size:14px;line-height:1.55}
  #panel h1{font-size:11px;font-weight:600;letter-spacing:0.18em;color:var(--dim);text-transform:uppercase;margin:0 0 6px}
  #panel h2{font-size:22px;font-weight:700;margin:0 0 14px;color:var(--text);line-height:1.2}
  #panel .desc{color:#c8c8d8;margin-bottom:18px}
  #panel .faces{margin-top:8px}
  .face-card{background:var(--panel2);border:1px solid var(--border);border-left-width:4px;border-radius:6px;padding:10px 12px;margin-bottom:8px;font-size:12.5px}
  .face-card .fname{font-weight:700;font-size:13px;letter-spacing:0.04em}
  .face-card .fq{color:#b8b8c8;font-style:italic;margin:3px 0}
  .face-card .fmeta{color:var(--dim);font-size:11.5px;margin-top:4px}
  .face-card .fmeta a{color:var(--accent);text-decoration:none}
  .face-card .fmeta a:hover{text-decoration:underline}
  .paper-ref{margin-top:20px;padding-top:14px;border-top:1px solid var(--border);color:var(--dim);font-size:12px}
  #bottom{grid-column:1 / span 2;grid-row:2;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:18px}
  #play-btn{background:var(--panel2);border:1px solid var(--border);color:var(--text);width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s}
  #play-btn:hover{background:#26263c}
  #slider-wrap{flex:1;display:flex;flex-direction:column;gap:6px}
  #slider-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);padding:0 6px}
  #slider-labels span{width:10%;text-align:center;cursor:pointer;transition:color 0.15s}
  #slider-labels span.active{color:var(--accent);font-weight:700}
  #slider-labels span:hover{color:var(--text)}
  #slider{width:100%;-webkit-appearance:none;appearance:none;height:6px;background:var(--border);border-radius:3px;outline:none}
  #slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--panel)}
  #slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--panel)}
  #mode-label{min-width:220px;text-align:right;font-size:13px;color:var(--dim);flex-shrink:0}
  #mode-label b{color:var(--accent);font-size:15px;display:block}
  .status-tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10.5px;font-weight:600;letter-spacing:0.04em}
  .status-open{background:#3a2020;color:#ff9080}
  .status-partial{background:#3a3020;color:#f5c26b}
  .status-conditional{background:#203a3a;color:#6fd0d0}
  .status-proved{background:#20351a;color:#8fde70}
  @media(max-width:900px){
    #app{grid-template-columns:1fr;grid-template-rows:1fr 300px 120px}
    #canvas-wrap{grid-column:1;grid-row:1}
    #panel{grid-column:1;grid-row:2;border-left:none;border-top:1px solid var(--border)}
    #bottom{grid-column:1;grid-row:3}
    #mode-label{min-width:140px}
  }
</style>
</head>
<body>
<div id="app">
  <div id="canvas-wrap">
    <div id="tooltip"></div>
  </div>
  <div id="panel">
    <h1 id="mode-num">Mode 1</h1>
    <h2 id="mode-title">Edge-on Circle</h2>
    <div id="mode-desc" class="desc"></div>
    <div id="faces" class="faces"></div>
    <div id="paper-ref" class="paper-ref">Paper 60 §1 — The e-circle as U(1) fiber of the 5D principal bundle.</div>
  </div>
  <div id="bottom">
    <button id="play-btn" title="Auto-cycle">&#9654;</button>
    <div id="slider-wrap">
      <div id="slider-labels" id="labels"></div>
      <input type="range" id="slider" min="0" max="900" step="1" value="0">
    </div>
    <div id="mode-label"><b id="ml-name">Edge-on</b><span id="ml-num">Mode 1 of 10</span></div>
  </div>
</div>

<script type="importmap">
{
  "imports":{
    "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

// ============================================================
// DATA
// ============================================================
const FACES = [
  {n:1,name:"TOPOLOGY",conj:"Lehmer",q:"What can LIVE on it?",side:"geo",status:"OPEN",statusLong:"OPEN (3/6 links)",conf:4,paper:"paper42",url:null,color:0xff6b5a},
  {n:2,name:"DYNAMICS",conj:"Cramér",q:"How does the flow TRAVERSE it?",side:"spec",status:"OPEN",statusLong:"OPEN (3/5 links)",conf:5,paper:"paper43",url:null,color:0x5ab0ff},
  {n:3,name:"HARMONICS",conj:"Collatz",q:"How do modes MIX on it?",side:"geo",status:"PARTIAL",statusLong:"PARTIAL (3.5/7)",conf:4,paper:"paper41",url:null,color:0xffb347},
  {n:4,name:"MEASURE",conj:"Sato–Tate",q:"How do angles DISTRIBUTE?",side:"geo",status:"PARTIAL",statusLong:"PARTIAL (3/6, non-CM PROVED Taylor 2011)",conf:6,paper:"paper44",url:null,color:0xffd24a},
  {n:5,name:"AMPLITUDE",conj:"Lindelöf",q:"How LOUD can it get?",side:"spec",status:"CONDITIONAL",statusLong:"CONDITIONAL on RH (3/5)",conf:7,paper:"paper45",url:null,color:0x4a7fff},
  {n:6,name:"SYMMETRY",conj:"Katz–Sarnak",q:"Which GROUP acts on it?",side:"spec",status:"PARTIAL",statusLong:"function fields PROVED, number fields PARTIAL",conf:7,paper:"paper46",url:null,color:0x7a5aff},
  {n:7,name:"CURVATURE",conj:"Yang–Mills",q:"How do connections CURVE on it?",side:"geo",status:"PROVED",statusLong:"PROVED 17/18 (CONDITIONAL on H4)",conf:9.5,paper:"paper08",url:"https://arxiv.org/abs/2511.22755",color:0xff4d4d},
  {n:8,name:"ARITHMETIC",conj:"Goldbach + Twin Primes",q:"How do integers LATTICE on it?",side:"spec",status:"OPEN",statusLong:"OPEN",conf:1,paper:"paper33, paper34",url:null,color:0x3ac0a0},
  {n:9,name:"RESONANCE",conj:"Selberg ¼",q:"What frequencies are ALLOWED?",side:"spec",status:"PARTIAL",statusLong:"Kim–Sarnak bound 975/4096 ≈ 0.238",conf:6,paper:"paper47 (planned)",url:null,color:0x9d5aff},
  {n:10,name:"SPREAD",conj:"QUE (Quantum Unique Ergodicity)",q:"How do eigenmodes SPREAD?",side:"both",status:"PROVED",statusLong:"arithmetic case PROVED (Lindenstrauss 2006, Fields 2010)",conf:8,paper:"paper48 (planned)",url:null,color:0xf5e6b8}
];

const GEO_FACES=FACES.filter(f=>f.side==="geo");    // 1,3,4,7,10(sort-of) — but per spec GEO={1,3,4,7,10}
const SPEC_FACES=FACES.filter(f=>f.side==="spec");  // 2,5,6,8,9
const GEO_IDX=[1,3,4,7,10];
const SPEC_IDX=[2,5,6,8,9];

const RIEMANN_ZEROS=[14.134725,21.022040,25.010858,30.424876,32.935062,37.586178,40.918719,43.327073,48.005151,49.773832,52.970321,56.446248,59.347044,60.831779,65.112544];

const VERTICES_22=[
  {n:"QG5D",c:10},{n:"YM",c:9.5},{n:"BSD",c:9},{n:"RH",c:8},{n:"QUE",c:8},
  {n:"GRH",c:7},{n:"Lindelöf",c:7},{n:"Katz–Sarnak",c:7},{n:"BGS",c:7},{n:"PvNP",c:7},{n:"H6",c:7},
  {n:"Sato–Tate",c:6},{n:"Selberg",c:6},
  {n:"Cramér",c:5},
  {n:"NS",c:4},{n:"Lehmer",c:4},{n:"Collatz",c:4},{n:"OPN",c:4},
  {n:"Hodge",c:3},{n:"B-C",c:3},
  {n:"Turbulence",c:2},
  {n:"ABC",c:1},{n:"Goldbach",c:1},{n:"Twin Primes",c:1},{n:"Schanuel",c:1},{n:"VP-vs-VNP",c:1}
];

const MODES=[
  {name:"Edge-on Circle",short:"Edge-on",section:"§1",
    desc:"What Paper 1 postulates: spacetime is M⁴ × S¹, the fifth dimension is a U(1) fiber of radius R ≈ 10.10 μm. From this angle, the e-circle looks like what its name suggests — a circle. The ten faces are invisible because we're seeing the object edge-on."},
  {name:"Disco Ball / Decahedron",short:"Disco ball",section:"§2",
    desc:"Step out of the silhouette and the circle reveals itself as a faceted gemstone. Ten flat panels, each one a famous mathematical conjecture viewing the circle from a different angle. Ten communities, each thinking their face is the whole truth."},
  {name:"Face-by-Face Fill",short:"Face-by-face",section:"§3",
    desc:"Each of the ten faces viewed in isolation. A selected face fills the canvas so its conjecture, question, status, and source paper can be read as a single chapter. The viewer auto-rotates through 1→10 every 4 seconds."},
  {name:"Geometric Circle Highlight",short:"Geometric equator",section:"§4",
    desc:"Five faces are properties of the e-circle as a geometric object — what lives on it, how connections curve on it, how modes vibrate. They share a common circle: the geometric equator."},
  {name:"Spectral Circle Highlight",short:"Spectral equator",section:"§5",
    desc:"Five faces are properties of the modular flow σ_t on the type III₁ Bost–Connes factor — how the flow returns, how loud the signal gets, which group acts. They share a common circle: the spectral equator."},
  {name:"Two Linked Circles (Hopf)",short:"Hopf link",section:"§6",
    desc:"Two circles. Linked. The geometric circle is the e-dimension. The spectral circle is the modular flow at KMS₁. They share a common algebraic home — the BC crossed product 𝒜_BC ⋊_σ ℝ — but on their own they're two disconnected loops."},
  {name:"Torus Formation",short:"Torus formation",section:"§7",
    desc:"Two circles, multiplied, give a torus. The product T² = S¹_geo × S¹_spec is the surface on which all ten faces coexist. SPREAD (QUE) is special: it's not on either generating circle — it's the cross-stitch that says the torus is real, not a formal product of unrelated circles."},
  {name:"Clifford Torus (Stereographic)",short:"Clifford torus",section:"§8",
    desc:"The torus T² embeds in the 3-sphere S³ as the Clifford torus — equidistant from two polar great circles. Stereographically projected to R³, it becomes the familiar donut. This is the mathematically honest picture: the e-circle's torus IS a Clifford torus, and the two generating circles ARE polar great circles of S³ via the Hopf fibration (U(1) bundle)."},
  {name:"Riemann Zeros at Crossings",short:"Riemann zeros",section:"§9",
    desc:"The Riemann zeros are where the geometric and spectral circles MEET on the torus. Each γ_n is a point that belongs to both circles. RH says the meeting is transversal — every zero sits exactly on the critical-line locus, the curve traced by the intersection. If RH fails, some zero floats off into the torus interior or above its surface, and the two-circle structure degenerates. RH is not a face. RH is the EXISTENCE of the torus."},
  {name:"Confidence Ellipse",short:"Confidence ellipse",section:"§10",
    desc:"The 22 vertices of the QG5D research programme distribute around the torus as an ellipse, not a circle. The major axis runs from QG5D (10/10) at the north pole to the south trough (1/10: Goldbach, Twin Primes, Schanuel, VP-vs-VNP). The lopsidedness IS the diagnostic: it shows where the framework's language is incomplete. Every future research traversal points in the direction of the lopsidedness — south."}
];

// ============================================================
// SCENE SETUP
// ============================================================
const wrap=document.getElementById('canvas-wrap');
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0a14);
const camera=new THREE.PerspectiveCamera(50,1,0.01,100);
camera.position.set(0,0,6);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(wrap.clientWidth,wrap.clientHeight);
wrap.appendChild(renderer.domElement);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.08;
controls.minDistance=1.5;
controls.maxDistance=15;

scene.add(new THREE.AmbientLight(0xffffff,0.55));
const dl=new THREE.DirectionalLight(0xffffff,0.9);
dl.position.set(3,5,4);
scene.add(dl);
const dl2=new THREE.DirectionalLight(0x88aaff,0.3);
dl2.position.set(-3,-2,-4);
scene.add(dl2);

// Root groups per mode. We swap visibility and cross-fade opacities.
const root=new THREE.Group();
scene.add(root);

// ============================================================
// BUILD OBJECTS
// ============================================================

// --- Mode 1: thin circle edge-on ---
const circleGeom=new THREE.TorusGeometry(1.6,0.012,16,120);
const edgeCircle=new THREE.Mesh(circleGeom,new THREE.MeshBasicMaterial({color:0xf5c26b}));
edgeCircle.rotation.x=Math.PI/2;// lay flat so "edge-on" = viewing from Z
// We'll look from (0,0,z) so flat ring in X-Y plane appears edge-on. Good.
root.add(edgeCircle);

// --- Mode 2-5: Decahedron (pentagonal antiprism, 10 triangular side faces) ---
const decaGroup=new THREE.Group();
const decaFaces=[];  // index -> {mesh,faceIdx}
function buildDecahedron(){
  // pentagonal antiprism: 5 top vertices rotated, 5 bottom vertices
  const R=1.3,h=0.6;
  const topV=[],botV=[];
  for(let i=0;i<5;i++){
    const a=i*2*Math.PI/5;
    topV.push(new THREE.Vector3(R*Math.cos(a),h,R*Math.sin(a)));
    const b=a+Math.PI/5;
    botV.push(new THREE.Vector3(R*Math.cos(b),-h,R*Math.sin(b)));
  }
  // 10 triangular side faces (antiprism belt)
  // face i up-pointing: top[i], bot[i], top[(i+1)%5]
  // face i down-pointing: bot[i], bot[(i+1)%5], top[(i+1)%5]
  const triFaces=[];
  for(let i=0;i<5;i++){
    triFaces.push([topV[i],botV[i],topV[(i+1)%5]]);
    triFaces.push([botV[i],botV[(i+1)%5],topV[(i+1)%5]]);
  }
  // reassign: face index 0..9 maps to FACES[0..9]
  triFaces.forEach((tri,idx)=>{
    const geo=new THREE.BufferGeometry();
    const positions=new Float32Array([
      tri[0].x,tri[0].y,tri[0].z,
      tri[1].x,tri[1].y,tri[1].z,
      tri[2].x,tri[2].y,tri[2].z
    ]);
    geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
    geo.setIndex([0,1,2]);
    geo.computeVertexNormals();
    const mat=new THREE.MeshStandardMaterial({
      color:FACES[idx].color,
      transparent:true,opacity:0.85,
      side:THREE.DoubleSide,
      roughness:0.4,metalness:0.2,
      emissive:FACES[idx].color,emissiveIntensity:0.15
    });
    const mesh=new THREE.Mesh(geo,mat);
    mesh.userData.faceIdx=idx;
    mesh.userData.baseColor=FACES[idx].color;
    decaGroup.add(mesh);
    decaFaces.push(mesh);
  });
  // Wireframe edges
  const edges=new THREE.EdgesGeometry(new THREE.CylinderGeometry(R,R,2*h,5,1));
  const wire=new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0x444460,transparent:true,opacity:0.5}));
  decaGroup.add(wire);
}
buildDecahedron();
decaGroup.visible=false;
root.add(decaGroup);

// --- Geometric equator ring & Spectral equator ring ---
function makeRing(radius,tubeR,color,segments=96){
  const g=new THREE.TorusGeometry(radius,tubeR,10,segments);
  const m=new THREE.MeshBasicMaterial({color:color,transparent:true,opacity:0.9});
  return new THREE.Mesh(g,m);
}
const geoRing=makeRing(1.35,0.02,0xff8050);// warm
geoRing.rotation.x=Math.PI/2;// horizontal circle
geoRing.visible=false;
root.add(geoRing);

const specRing=makeRing(1.35,0.02,0x5ab0ff);// cool
specRing.rotation.y=Math.PI/2;// vertical circle, perpendicular to geoRing
specRing.visible=false;
root.add(specRing);

// Hopf link version — thicker, with bead markers
const hopfGroup=new THREE.Group();
const hopfGeo=makeRing(1.2,0.035,0xff6b5a,128);
hopfGeo.rotation.x=Math.PI/2;
hopfGeo.material.opacity=0.95;
const hopfSpec=makeRing(1.2,0.035,0x5ab0ff,128);
hopfSpec.rotation.y=Math.PI/2;
hopfSpec.material.opacity=0.95;
hopfGroup.add(hopfGeo,hopfSpec);

// beads on each ring at face positions
function addBeads(group,ringAxis,faceIndices,radius=1.2){
  faceIndices.forEach((fi,k)=>{
    const face=FACES[fi-1];
    const a=k*2*Math.PI/faceIndices.length;
    const sph=new THREE.Mesh(new THREE.SphereGeometry(0.06,16,12),
      new THREE.MeshStandardMaterial({color:face.color,emissive:face.color,emissiveIntensity:0.6,roughness:0.3}));
    if(ringAxis==='geo'){ sph.position.set(radius*Math.cos(a),0,radius*Math.sin(a)); }
    else { sph.position.set(0,radius*Math.cos(a),radius*Math.sin(a)); }
    sph.userData.faceIdx=fi-1;
    group.add(sph);
  });
}
addBeads(hopfGroup,'geo',GEO_IDX);
addBeads(hopfGroup,'spec',SPEC_IDX);
hopfGroup.visible=false;
root.add(hopfGroup);

// --- Torus (product T²) ---
const torusGroup=new THREE.Group();
const torusMajor=1.2,torusMinor=0.45;
const torusMesh=new THREE.Mesh(
  new THREE.TorusGeometry(torusMajor,torusMinor,32,96),
  new THREE.MeshStandardMaterial({color:0x8878c0,transparent:true,opacity:0.45,side:THREE.DoubleSide,roughness:0.5,metalness:0.3,emissive:0x332255,emissiveIntensity:0.2})
);
torusGroup.add(torusMesh);

// highlight the two generating circles on the torus (major & minor)
const majGen=makeRing(torusMajor,0.025,0xff8050,128);// lies in xy-plane at φ=0
majGen.rotation.x=Math.PI/2;
torusGroup.add(majGen);

const minGenCurve=new THREE.Mesh(
  new THREE.TorusGeometry(torusMinor,0.025,8,64),
  new THREE.MeshBasicMaterial({color:0x5ab0ff})
);
// position the minor circle at φ=0 on the torus: center at (majorR,0,0), in the plane perpendicular to the major circle's tangent there
minGenCurve.position.set(torusMajor,0,0);
minGenCurve.rotation.y=Math.PI/2;
torusGroup.add(minGenCurve);

// scatter face beads on torus surface (5 major angles, 5 minor angles + SPREAD as crossing)
function torusPoint(u,v,R=torusMajor,r=torusMinor){
  return new THREE.Vector3((R+r*Math.cos(v))*Math.cos(u),(R+r*Math.cos(v))*Math.sin(u),r*Math.sin(v));
}
GEO_IDX.forEach((fi,k)=>{
  if(fi===10)return;// SPREAD treated specially
  const f=FACES[fi-1];
  const u=k*2*Math.PI/4,v=0;
  const p=torusPoint(u,v);
  const sph=new THREE.Mesh(new THREE.SphereGeometry(0.07,16,12),new THREE.MeshStandardMaterial({color:f.color,emissive:f.color,emissiveIntensity:0.5}));
  sph.position.copy(p);
  sph.userData.faceIdx=fi-1;
  torusGroup.add(sph);
});
SPEC_IDX.forEach((fi,k)=>{
  const f=FACES[fi-1];
  const u=0.3,v=k*2*Math.PI/5;
  const p=torusPoint(u,v);
  const sph=new THREE.Mesh(new THREE.SphereGeometry(0.07,16,12),new THREE.MeshStandardMaterial({color:f.color,emissive:f.color,emissiveIntensity:0.5}));
  sph.position.copy(p);
  sph.userData.faceIdx=fi-1;
  torusGroup.add(sph);
});
// SPREAD: a curve crossing the torus
{
  const pts=[];
  for(let t=0;t<=1;t+=0.01){pts.push(torusPoint(2*Math.PI*t*2,2*Math.PI*t));}
  const spreadGeo=new THREE.BufferGeometry().setFromPoints(pts);
  const spreadLine=new THREE.Line(spreadGeo,new THREE.LineBasicMaterial({color:0xf5e6b8,transparent:true,opacity:0.85}));
  spreadLine.userData.faceIdx=9;
  torusGroup.add(spreadLine);
}
torusGroup.visible=false;
root.add(torusGroup);

// --- Clifford torus via stereographic projection from S³ ---
// Clifford torus: (cos α, sin α, cos β, sin β)/√2 in R⁴ (4D unit sphere coords divided by √2 — lives on S³).
// Stereographic from north pole (0,0,0,1): (x,y,z,w) -> (x,y,z)/(1-w).
function cliffordPoint(alpha,beta){
  const s=1/Math.SQRT2;
  const x=s*Math.cos(alpha),y=s*Math.sin(alpha),z=s*Math.cos(beta),w=s*Math.sin(beta);
  const d=1-w;
  return new THREE.Vector3(x/d,y/d,z/d);
}
// Build Clifford torus surface as a parametric mesh
const clifGroup=new THREE.Group();
{
  const uSeg=80,vSeg=40;
  const geo=new THREE.BufferGeometry();
  const positions=[],indices=[],uvs=[];
  for(let i=0;i<=uSeg;i++){
    for(let j=0;j<=vSeg;j++){
      const a=i/uSeg*2*Math.PI,b=j/vSeg*2*Math.PI;
      const p=cliffordPoint(a,b);
      positions.push(p.x,p.y,p.z);
      uvs.push(i/uSeg,j/vSeg);
    }
  }
  for(let i=0;i<uSeg;i++){
    for(let j=0;j<vSeg;j++){
      const a=i*(vSeg+1)+j,b=(i+1)*(vSeg+1)+j,c=(i+1)*(vSeg+1)+(j+1),d=i*(vSeg+1)+(j+1);
      indices.push(a,b,d,b,c,d);
    }
  }
  geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  // scale down to fit frame
  geo.scale(0.35,0.35,0.35);
  const mat=new THREE.MeshStandardMaterial({color:0x8878c0,transparent:true,opacity:0.5,side:THREE.DoubleSide,roughness:0.4,metalness:0.25,emissive:0x2a1f4a,emissiveIntensity:0.3});
  const mesh=new THREE.Mesh(geo,mat);
  clifGroup.add(mesh);

  // The two polar great circles (generators): α=0 and β=0 sweeps
  const genMat1=new THREE.LineBasicMaterial({color:0xff8050,transparent:true,opacity:0.95});
  const genMat2=new THREE.LineBasicMaterial({color:0x5ab0ff,transparent:true,opacity:0.95});
  const ptsA=[],ptsB=[];
  for(let k=0;k<=160;k++){
    const t=k/160*2*Math.PI;
    const pa=cliffordPoint(t,0);pa.multiplyScalar(0.35);
    const pb=cliffordPoint(0,t);pb.multiplyScalar(0.35);
    ptsA.push(pa);ptsB.push(pb);
  }
  const lineA=new THREE.Line(new THREE.BufferGeometry().setFromPoints(ptsA),genMat1);
  const lineB=new THREE.Line(new THREE.BufferGeometry().setFromPoints(ptsB),genMat2);
  clifGroup.add(lineA,lineB);

  // Two Villarceau-style auxiliary circles (α+β=const family)
  const vMat=new THREE.LineBasicMaterial({color:0xf5c26b,transparent:true,opacity:0.55});
  for(const c of [Math.PI/3,-Math.PI/3]){
    const pts=[];
    for(let k=0;k<=160;k++){
      const t=k/160*2*Math.PI;
      const p=cliffordPoint(t,t+c);p.multiplyScalar(0.35);
      pts.push(p);
    }
    clifGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),vMat));
  }
}
clifGroup.visible=false;
root.add(clifGroup);

// --- Riemann zeros on Clifford torus ---
const zerosGroup=new THREE.Group();
RIEMANN_ZEROS.forEach((g,k)=>{
  const alpha=g%(2*Math.PI);
  const beta=alpha;// crossings = where α=β on Clifford torus (critical-line locus)
  const p=cliffordPoint(alpha,beta);p.multiplyScalar(0.35);
  const sph=new THREE.Mesh(
    new THREE.SphereGeometry(0.035,14,10),
    new THREE.MeshStandardMaterial({color:0xffe58a,emissive:0xffcc55,emissiveIntensity:1.2,roughness:0.3})
  );
  sph.position.copy(p);
  sph.userData.label=`γ_${k+1} = ${g.toFixed(3)}`;
  sph.userData.isZero=true;
  zerosGroup.add(sph);

  // glow halo
  const halo=new THREE.Mesh(
    new THREE.SphereGeometry(0.07,12,10),
    new THREE.MeshBasicMaterial({color:0xffcc66,transparent:true,opacity:0.25})
  );
  halo.position.copy(p);
  zerosGroup.add(halo);
});
// Draw the critical-line locus α=β
{
  const pts=[];
  for(let k=0;k<=240;k++){
    const t=k/240*2*Math.PI;
    const p=cliffordPoint(t,t);p.multiplyScalar(0.35);
    pts.push(p);
  }
  const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0xffd86b,transparent:true,opacity:0.8}));
  zerosGroup.add(line);
}
zerosGroup.visible=false;
root.add(zerosGroup);

// --- Confidence ellipse: beads for 22+ vertices traversing a torus-surface path ---
const confGroup=new THREE.Group();
// use the regular torus (not Clifford) for readability
{
  // translucent torus for context
  const ctxTorus=new THREE.Mesh(
    new THREE.TorusGeometry(1.2,0.45,32,96),
    new THREE.MeshStandardMaterial({color:0x5a5078,transparent:true,opacity:0.2,side:THREE.DoubleSide,roughness:0.6})
  );
  confGroup.add(ctxTorus);

  // Ellipse around torus: lopsided path. Major axis confidence 10→1 moves north-pole to south-trough.
  // Parametrize: t∈[0,1], u=2πt, v=π*(1-2t) so we move from top of tube to bottom over one traversal.
  const n=VERTICES_22.length;
  const labelSprites=[];
  VERTICES_22.forEach((v,i)=>{
    const t=i/n;
    const u=2*Math.PI*t;
    // ellipse bias: higher confidence -> near "north pole" (v=π/2, outer top), low conf -> south (v=-π/2, outer bottom)
    const confNorm=(v.c-1)/9;// 0..1
    const vv=Math.PI*(confNorm-0.5)*1.4;
    const p=torusPoint(u,vv);
    const size=0.04+0.09*confNorm;
    // color ramp: warm for high, cool for low
    const col=new THREE.Color().setHSL(0.6-0.6*confNorm,0.7,0.55);
    const sph=new THREE.Mesh(new THREE.SphereGeometry(size,16,12),new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.55}));
    sph.position.copy(p);
    sph.userData.label=`${v.n} (${v.c}/10)`;
    confGroup.add(sph);
  });

  // Connect with a line path
  const pathPts=[];
  VERTICES_22.forEach((v,i)=>{
    const t=i/n;
    const u=2*Math.PI*t;
    const confNorm=(v.c-1)/9;
    const vv=Math.PI*(confNorm-0.5)*1.4;
    pathPts.push(torusPoint(u,vv));
  });
  pathPts.push(pathPts[0]);
  const pathLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pathPts),new THREE.LineBasicMaterial({color:0xc8b070,transparent:true,opacity:0.55}));
  confGroup.add(pathLine);

  // north-pole and south-trough markers
  const nMark=new THREE.Mesh(new THREE.SphereGeometry(0.04,12,10),new THREE.MeshBasicMaterial({color:0xffffff}));
  nMark.position.set(1.2,0,0.45);
  confGroup.add(nMark);
  const sMark=new THREE.Mesh(new THREE.SphereGeometry(0.04,12,10),new THREE.MeshBasicMaterial({color:0x663355}));
  sMark.position.set(-1.2,0,-0.45);
  confGroup.add(sMark);
}
confGroup.visible=false;
root.add(confGroup);

// ============================================================
// MODE CONTROLLER
// ============================================================
let currentMode=0;// float 0..9
let targetMode=0;
let lastSnap=0;

function setMode(t){
  // t is continuous 0..9 during tween
  currentMode=t;
  const snap=Math.round(t);

  // visibility rules by snap (snap is 0..9, = modeIndex)
  edgeCircle.visible=(snap<=0);
  decaGroup.visible=(snap>=1&&snap<=4);
  geoRing.visible=(snap===3);
  specRing.visible=(snap===4);
  hopfGroup.visible=(snap===5);
  torusGroup.visible=(snap===6);
  clifGroup.visible=(snap===7||snap===8);
  zerosGroup.visible=(snap===8);
  confGroup.visible=(snap===9);

  // fades & highlights
  const fadeIn=(t-snap+1);// not used heavily
  // Mode 1 -> 2 interpolation: thin circle swells into decahedron
  if(t<1){
    const a=t;// 0..1
    edgeCircle.scale.set(1,1,1);
    edgeCircle.material.opacity=1;
    decaGroup.visible=(a>0.05);
    decaFaces.forEach(m=>{m.material.opacity=0.85*a; m.material.emissiveIntensity=0.15*a;});
    decaGroup.scale.setScalar(0.4+0.6*a);
  } else {
    edgeCircle.visible=false;
    decaFaces.forEach(m=>{m.material.opacity=0.85;m.material.emissiveIntensity=0.15;});
    decaGroup.scale.setScalar(1);
  }

  // Mode 3: face zoom (auto-rotate through faces)
  if(snap===2){
    decaGroup.visible=true;
    const rot=(Date.now()/4000)%10;
    const selFace=Math.floor(rot);
    decaFaces.forEach((m,i)=>{
      m.material.opacity=(i===selFace)?1.0:0.18;
      m.material.emissiveIntensity=(i===selFace)?0.6:0.05;
    });
    // Pan camera slightly toward that face's center
    const center=new THREE.Vector3();
    decaFaces[selFace].geometry.computeBoundingBox();
    decaFaces[selFace].geometry.boundingBox.getCenter(center);
    camZoomTarget=center.clone().multiplyScalar(3.2);
  } else {
    camZoomTarget=null;
  }

  // Mode 4 (geometric highlight): dim spectral faces
  if(snap===3){
    decaFaces.forEach((m,i)=>{
      const f=FACES[i];
      const on=(f.side==="geo");
      m.material.opacity=on?0.95:0.18;
      m.material.emissiveIntensity=on?0.45:0.05;
    });
  }
  // Mode 5 (spectral highlight): dim geometric
  if(snap===4){
    decaFaces.forEach((m,i)=>{
      const f=FACES[i];
      const on=(f.side==="spec");
      m.material.opacity=on?0.95:0.18;
      m.material.emissiveIntensity=on?0.45:0.05;
    });
  }
  // Restore decahedron opacities when leaving those modes
  if(snap===1){
    decaFaces.forEach((m,i)=>{m.material.opacity=0.85;m.material.emissiveIntensity=0.18;});
  }

  // Mode 6->7 tween: hopf rings sweep to torus (drag-only, not at snaps)
  if(t>5&&t<6){
    const a=(t-5);
    hopfGroup.visible=(a<0.5);
    torusGroup.visible=(a>=0.5);
    if(torusGroup.visible)torusMesh.material.opacity=0.1+0.35*((a-0.5)*2);
  } else if(snap===6){
    torusMesh.material.opacity=0.45;
  }

  // Mode 7->8 tween: product torus morphs to Clifford torus (only during drag, not at integer snaps)
  if(t>6&&t<7){
    const a=(t-6);
    torusGroup.visible=(a<0.8);
    clifGroup.visible=(a>0.2);
    if(clifGroup.visible)clifGroup.children[0].material.opacity=0.5*Math.max(0,Math.min(1,(a-0.2)/0.6));
  }

  // Mode 8->9: zeros light up, surface dims
  if(t>7&&t<8){
    const a=(t-7);
    clifGroup.children[0].material.opacity=0.5-0.35*a;
    zerosGroup.visible=a>0.2;
  } else if(snap===8){
    clifGroup.children[0].material.opacity=0.18;
  } else if(snap===7){
    clifGroup.children[0].material.opacity=0.5;
  }

  // Mode 10: confidence ellipse. Hide clifford & zeros detail
  if(snap===9){
    clifGroup.visible=false;
    zerosGroup.visible=false;
    confGroup.visible=true;
  }

  // Camera constraints per mode
  if(snap===0){
    controls.enableRotate=false;
    camera.position.set(0,0,6);
    camera.lookAt(0,0,0);
  } else {
    controls.enableRotate=true;
  }
}

// ============================================================
// UI
// ============================================================
const slider=document.getElementById('slider');
const mlName=document.getElementById('ml-name');
const mlNum=document.getElementById('ml-num');
const modeNum=document.getElementById('mode-num');
const modeTitle=document.getElementById('mode-title');
const modeDesc=document.getElementById('mode-desc');
const facesDiv=document.getElementById('faces');
const paperRef=document.getElementById('paper-ref');
const labelsDiv=document.getElementById('slider-labels');

for(let i=0;i<10;i++){
  const s=document.createElement('span');
  s.textContent=i+1;
  s.dataset.idx=i;
  s.addEventListener('click',()=>{
    slider.value=i*100;
    onSliderChange();
  });
  labelsDiv.appendChild(s);
}

function statusClass(status){
  if(status.startsWith("PROVED"))return"status-proved";
  if(status.startsWith("CONDITIONAL"))return"status-conditional";
  if(status.startsWith("PARTIAL"))return"status-partial";
  return"status-open";
}

function renderPanel(modeIdx){
  const m=MODES[modeIdx];
  modeNum.textContent=`Mode ${modeIdx+1}`;
  modeTitle.textContent=m.name;
  modeDesc.textContent=m.desc;
  paperRef.textContent=`Paper 60 ${m.section}`;

  // face list per mode
  let facesToShow=[];
  const idx=modeIdx+1;
  if(idx===2){facesToShow=FACES.map((_,i)=>i);}
  else if(idx===3){
    const rot=Math.floor((Date.now()/4000)%10);
    facesToShow=[rot];
  }
  else if(idx===4){facesToShow=GEO_IDX.map(i=>i-1);}
  else if(idx===5){facesToShow=SPEC_IDX.map(i=>i-1);}
  else if(idx===7){facesToShow=FACES.map((_,i)=>i);}
  else if(idx===9){facesToShow=[];/* zeros listed inline below */}
  else if(idx===10){facesToShow=[];}

  let html="";
  facesToShow.forEach(i=>{
    const f=FACES[i];
    const col="#"+f.color.toString(16).padStart(6,"0");
    const sc=statusClass(f.status);
    const sourceLink=f.url?`<a href="${f.url}" target="_blank">${f.paper}</a>`:f.paper;
    html+=`<div class="face-card" style="border-left-color:${col}">
      <div class="fname" style="color:${col}">${f.n}. ${f.name} — ${f.conj}</div>
      <div class="fq">"${f.q}"</div>
      <div class="fmeta">
        <span class="status-tag ${sc}">${f.statusLong}</span>
        &nbsp; confidence ${f.conf}/10 &nbsp;·&nbsp; side: ${f.side==="geo"?"geometric":f.side==="spec"?"spectral":"both"}
        <br>source: ${sourceLink}
      </div>
    </div>`;
  });
  if(idx===9){
    html+=`<div style="font-size:12px;color:var(--dim);margin-top:10px">First 15 Riemann zeros γ_n (imaginary parts):</div>`;
    html+=`<div style="font-size:11.5px;font-family:ui-monospace,Menlo,monospace;color:#c8c8d8;line-height:1.6;margin-top:4px">`;
    RIEMANN_ZEROS.forEach((g,k)=>{
      html+=`<div>γ_${k+1} = ${g.toFixed(4)}</div>`;
    });
    html+=`</div>`;
  }
  if(idx===10){
    html+=`<div style="font-size:12px;color:var(--dim);margin-top:6px">22+ vertices by confidence:</div>`;
    html+=`<div style="font-size:12px;line-height:1.65;margin-top:4px">`;
    VERTICES_22.forEach(v=>{
      const n=(v.c-1)/9;
      const col=`hsl(${(1-n)*220},60%,${45+n*25}%)`;
      html+=`<div style="display:flex;justify-content:space-between;border-bottom:1px solid #20202e;padding:2px 0">
        <span style="color:${col}">${v.n}</span><span style="color:${col};font-weight:600">${v.c}/10</span></div>`;
    });
    html+=`</div>`;
    html+=`<div style="margin-top:10px;font-size:12px;color:var(--accent)">Major axis: QG5D (north) → Goldbach/Twin/Schanuel/VP-vs-VNP (south trough)</div>`;
  }
  facesDiv.innerHTML=html;

  // slider labels
  Array.from(labelsDiv.children).forEach((el,i)=>{
    el.classList.toggle('active',i===modeIdx);
  });
  mlName.textContent=m.short;
  mlNum.textContent=`Mode ${modeIdx+1} of 10`;
}

function onSliderChange(){
  const v=parseFloat(slider.value);// 0..900
  const t=v/100;
  targetMode=t;
  setMode(t);
  const snap=Math.round(t);
  renderPanel(snap);
}
slider.addEventListener('input',onSliderChange);
slider.addEventListener('change',()=>{
  // snap to nearest detent
  const t=parseFloat(slider.value)/100;
  const snap=Math.round(t);
  slider.value=snap*100;
  onSliderChange();
});

// Play button
let playing=false,playTimer=null,playStart=0;
const playBtn=document.getElementById('play-btn');
playBtn.addEventListener('click',()=>{
  playing=!playing;
  if(playing){
    playBtn.innerHTML="&#10074;&#10074;";
    const startMode=Math.round(parseFloat(slider.value)/100);
    playStart=performance.now()-startMode*4000;
  } else {
    playBtn.innerHTML="&#9654;";
  }
});

// Tooltip on hover
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
const tooltip=document.getElementById('tooltip');
renderer.domElement.addEventListener('mousemove',(e)=>{
  const rect=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const objs=[];
  root.traverse(o=>{if(o.visible&&o.isMesh)objs.push(o);});
  const hits=raycaster.intersectObjects(objs,false);
  if(hits.length){
    const h=hits[0].object;
    let label=null;
    if(h.userData.faceIdx!==undefined){
      const f=FACES[h.userData.faceIdx];
      label=`${f.n}. ${f.name} — ${f.conj}`;
    } else if(h.userData.label){
      label=h.userData.label;
    }
    if(label){
      tooltip.textContent=label;
      tooltip.style.display='block';
      tooltip.style.left=(e.clientX-rect.left+12)+'px';
      tooltip.style.top=(e.clientY-rect.top+12)+'px';
      return;
    }
  }
  tooltip.style.display='none';
});

// Resize
function onResize(){
  const w=wrap.clientWidth,h=wrap.clientHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize',onResize);
onResize();

// ============================================================
// ANIMATE
// ============================================================
let camZoomTarget=null;
function animate(){
  requestAnimationFrame(animate);
  if(playing){
    const elapsed=performance.now()-playStart;
    const t=(elapsed/4000);
    if(t>=10){playing=false;playBtn.innerHTML="&#9654;";slider.value=0;onSliderChange();}
    else {
      slider.value=Math.min(900,t*100);
      onSliderChange();
    }
  }
  // Auto-rotate for mode 3 (index 2) to cycle faces
  if(Math.round(currentMode)===2){
    renderPanel(2);
    setMode(currentMode);
  }
  // subtle idle spin for disco ball
  if(decaGroup.visible){decaGroup.rotation.y+=0.003;}
  if(torusGroup.visible){torusGroup.rotation.y+=0.002;}
  if(clifGroup.visible){clifGroup.rotation.y+=0.002;}
  if(confGroup.visible){confGroup.rotation.y+=0.0015;}
  if(hopfGroup.visible){hopfGroup.rotation.y+=0.003;}

  // Mode 1: constrain camera
  if(Math.round(currentMode)===0){
    camera.position.lerp(new THREE.Vector3(0,0,6),0.1);
    camera.lookAt(0,0,0);
  }

  controls.update();
  renderer.render(scene,camera);
}
animate();

// init
onSliderChange();
</script>
