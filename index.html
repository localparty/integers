<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Integers</title>
<meta name="description" content="The Integers programme — discovery of the fine structure of the mathematics that describes our universe from the spectral and geometric properties of the integers.">

<!-- GitHub-exact markdown styling (light+dark via data-color-mode=auto) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown.min.css">

<!-- highlight.js theme (swapped at runtime to match OS preference) -->
<link rel="stylesheet" id="hljs-theme" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">

<style>
  :root { color-scheme: light dark; }
  body { margin: 0; padding: 0; background: #fff; }
  @media (prefers-color-scheme: dark) { body { background: #0d1117; } }
  .markdown-body {
    box-sizing: border-box;
    min-width: 200px;
    max-width: 980px;
    margin: 0 auto;
    padding: 45px 45px 80px;
  }
  @media (max-width: 767px) {
    .markdown-body { padding: 20px 15px 60px; }
  }
  .status {
    color: #888;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 45px;
    text-align: center;
  }
</style>
</head>
<body>

<article
  class="markdown-body"
  data-color-mode="auto"
  data-light-theme="light"
  data-dark-theme="dark"
  id="content"
>
  <p class="status">Loading README…</p>
</article>

<script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
<script>
  // Swap highlight.js CSS to match OS light/dark preference (live on change).
  const darkQuery = matchMedia('(prefers-color-scheme: dark)');
  function applyHljsTheme(dark) {
    document.getElementById('hljs-theme').href = dark
      ? 'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css'
      : 'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css';
  }
  applyHljsTheme(darkQuery.matches);
  darkQuery.addEventListener('change', (e) => applyHljsTheme(e.matches));

  // GitHub-flavored markdown: tables, task lists, strikethrough, autolinks.
  marked.setOptions({ gfm: true, breaks: false });

  fetch('README.md', { cache: 'no-cache' })
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(md => {
      const content = document.getElementById('content');
      content.innerHTML = marked.parse(md);
      // Run syntax highlighting on every code block that marked produced.
      content.querySelectorAll('pre code').forEach(el => {
        try { hljs.highlightElement(el); } catch (_) { /* ignore */ }
      });
    })
    .catch(err => {
      document.getElementById('content').innerHTML =
        '<p class="status">Failed to load README.md: ' + err.message + '</p>';
    });
</script>

</body>
</html>
